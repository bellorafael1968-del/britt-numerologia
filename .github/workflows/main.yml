name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore $HOME/keystore.jks \
            -alias britt \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass brittobando123 -keypass brittobando123 \
            -dname "CN=Britt Obando, OU=Numerologia, O=BrittObando, L=Unknown, S=Unknown, C=US"

      - name: Create Android Project
        run: |
          mkdir -p twa-app/app/src/main/res/values
          mkdir -p twa-app/app/src/main/res/xml
          mkdir -p twa-app/app/src/main/res/drawable
          mkdir -p twa-app/gradle/wrapper

          python3 << 'PYEOF'
          import os

          files = {
            "twa-app/settings.gradle": """
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "NumerologiaBritt"
          include ':app'
          """,
            "twa-app/build.gradle": """
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          """,
            "twa-app/gradle.properties": """
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          """,
            "twa-app/app/build.gradle": """
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.brittobando.numerologia'
              compileSdk 34
              defaultConfig {
                  applicationId "com.brittobando.numerologia"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file("/home/runner/keystore.jks")
                      storePassword "brittobando123"
                      keyAlias "britt"
                      keyPassword "brittobando123"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          """,
            "twa-app/app/src/main/AndroidManifest.xml": """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="Numerologia"
                  android:theme="@style/AppTheme"
                  android:allowBackup="true"
                  android:supportsRtl="true">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://whimsical-peony-b84176.netlify.app" />
                      <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:resource="@color/colorPrimary" />
                      <meta-data android:name="android.support.customtabs.trusted.SPLASH_IMAGE_DRAWABLE"
                          android:resource="@drawable/splash" />
                      <meta-data android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:resource="@color/backgroundColor" />
                      <meta-data android:name="android.support.customtabs.trusted.SPLASH_SCREEN_FADE_OUT_DURATION"
                          android:value="300" />
                      <meta-data android:name="android.support.customtabs.trusted.FILE_PROVIDER_AUTHORITY"
                          android:value="com.brittobando.numerologia.fileprovider" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https"
                              android:host="whimsical-peony-b84176.netlify.app"/>
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="com.brittobando.numerologia.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/filepaths" />
                  </provider>
              </application>
          </manifest>""",
            "twa-app/app/src/main/res/values/colors.xml": """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#C9A84C</color>
              <color name="backgroundColor">#0E0B1A</color>
          </resources>""",
            "twa-app/app/src/main/res/values/styles.xml": """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.MaterialComponents.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
              </style>
          </resources>""",
            "twa-app/app/src/main/res/xml/filepaths.xml": """<?xml version="1.0" encoding="utf-8"?>
          <paths><cache-path name="cache" path="." /></paths>""",
            "twa-app/app/src/main/res/drawable/splash.xml": """<?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#0E0B1A"/>
          </shape>""",
            "twa-app/gradle/wrapper/gradle-wrapper.properties": """distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists""",
          }

          for path, content in files.items():
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w') as f:
                  f.write(content.strip())
              print(f"Created: {path}")
          PYEOF

      - name: Setup Gradle Wrapper
        run: |
          cd twa-app
          gradle wrapper --gradle-version 8.2 2>&1 | tail -3
          chmod +x gradlew
          ls -la

      - name: Build APK
        run: |
          cd twa-app
          ./gradlew assembleRelease --stacktrace 2>&1

      - name: Find APK
        run: find twa-app -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NumerologiaBritt-APK
          path: twa-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
