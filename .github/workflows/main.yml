name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap project
        run: |
          mkdir apk-build && cd apk-build
          bubblewrap init --manifest https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json --directory . --skipPwaValidation 2>&1 || true

      - name: Patch twa-manifest.json
        run: |
          cd apk-build
          python3 << 'PYEOF'
          import json
          with open('twa-manifest.json', 'r') as f:
              d = json.load(f)
          d['packageId'] = 'com.brittobando.numerologia'
          d['host'] = 'raw.githubusercontent.com'
          d['startUrl'] = '/'
          d['name'] = 'Carta Numerologica Britt Obando'
          d['launcherName'] = 'Numerologia'
          d['display'] = 'standalone'
          d['themeColor'] = '#C9A84C'
          d['backgroundColor'] = '#0E0B1A'
          d['appVersion'] = '1'
          d['appVersionCode'] = 1
          d['signingKey'] = {'path': '../keystore.jks', 'alias': 'britt'}
          with open('twa-manifest.json', 'w') as f:
              json.dump(d, f, indent=2)
          print('Manifest patched OK')
          PYEOF

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias britt \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass brittobando123 \
            -keypass brittobando123 \
            -dname "CN=Britt Obando, OU=Numerologia, O=BrittObando, L=Unknown, S=Unknown, C=US"

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build 2>&1

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NumerologiaBritt-APK
          path: |
            apk-build/app/build/outputs/apk/**/*.apk
            apk-build/*.apk
          if-no-files-found: warn
