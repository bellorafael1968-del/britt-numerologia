name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias britt \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass brittobando123 \
            -keypass brittobando123 \
            -dname "CN=Britt Obando, OU=Numerologia, O=BrittObando, L=Unknown, S=Unknown, C=US"

      - name: Initialize Bubblewrap
        run: |
          mkdir -p apk-build && cd apk-build
          printf "y\n" | bubblewrap init \
            --manifest https://whimsical-peony-b84176.netlify.app/manifest.json \
            --skipPwaValidation \
            2>&1
          ls -la

      - name: Patch twa-manifest
        run: |
          cd apk-build
          python3 - << 'EOF'
          import json, os
          files = os.listdir('.')
          print("Archivos en apk-build:", files)
          if 'twa-manifest.json' in files:
              with open('twa-manifest.json') as f:
                  d = json.load(f)
              d['signingKey'] = {'path': '../keystore.jks', 'alias': 'britt'}
              d['appVersionCode'] = 1
              with open('twa-manifest.json', 'w') as f:
                  json.dump(d, f, indent=2)
              print("Manifest actualizado OK")
          else:
              print("ERROR: twa-manifest.json no encontrado")
              exit(1)
          EOF

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build 2>&1

      - name: Find APK
        run: |
          find . -name "*.apk" 2>/dev/null
          find . -name "*.aab" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NumerologiaBritt-APK
          path: |
            apk-build/app/build/outputs/apk/**/*.apk
            apk-build/app/build/outputs/bundle/**/*.aab
          if-no-files-found: warn
