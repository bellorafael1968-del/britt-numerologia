name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore $HOME/keystore.jks \
            -alias britt \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass brittobando123 \
            -keypass brittobando123 \
            -dname "CN=Britt Obando, OU=Numerologia, O=BrittObando, L=Unknown, S=Unknown, C=US"

      - name: Create project files
        run: |
          mkdir -p apk-build
          cat > apk-build/twa-manifest.json << 'EOF'
          {
            "packageId": "com.brittobando.numerologia",
            "host": "whimsical-peony-b84176.netlify.app",
            "startUrl": "/",
            "name": "Carta Numerologica Britt Obando",
            "launcherName": "Numerologia",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#C9A84C",
            "navigationColor": "#0E0B1A",
            "navigationColorDark": "#0E0B1A",
            "navigationDividerColor": "#C9A84C",
            "navigationDividerColorDark": "#C9A84C",
            "backgroundColor": "#0E0B1A",
            "enableNotifications": false,
            "iconUrl": "https://whimsical-peony-b84176.netlify.app/icons/icon-512.png",
            "maskableIconUrl": "https://whimsical-peony-b84176.netlify.app/icons/icon-512.png",
            "monochromeIconUrl": "https://whimsical-peony-b84176.netlify.app/icons/icon-512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "/home/runner/keystore.jks",
              "alias": "britt"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuestOnly": false,
            "fullScopeUrl": "https://whimsical-peony-b84176.netlify.app/",
            "minSdkVersion": 19,
            "targetSdkVersion": 34,
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "features": {},
            "alphaDependencies": { "enabled": false },
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://whimsical-peony-b84176.netlify.app/manifest.json",
            "fallbackType": "customtabs",
            "shortcuts": []
          }
          EOF
          echo "twa-manifest.json creado:"
          cat apk-build/twa-manifest.json

      - name: Build APK with Bubblewrap
        run: |
          cd apk-build
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath /home/runner/keystore.jks \
            --signingKeyAlias britt \
            2>&1

      - name: Find APK
        run: |
          echo "Buscando APKs..."
          find . -name "*.apk" 2>/dev/null
          find . -name "*.aab" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NumerologiaBritt-APK
          path: |
            apk-build/app/build/outputs/apk/**/*.apk
            apk-build/app/build/outputs/bundle/**/*.aab
          if-no-files-found: warn
